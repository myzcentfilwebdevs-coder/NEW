<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Job Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="busMenu" class="menu-container" style="display: none;">
        <div class="menu-backdrop"></div>
        <div class="menu-content">
            <div class="menu-header">
                <div class="company-logo">
                    <i class="fas fa-bus"></i>
                </div>
                <div class="company-info">
                    <h1>Los Santos Bus Company</h1>
                    <p>Professional Transportation Services</p>
                </div>
                <div class="close-btn" onclick="closeBusMenu()">
                    <i class="fas fa-times"></i>
                </div>
            </div>

            <div class="menu-body">
                <div class="status-panel">
                    <div class="status-item">
                        <div class="status-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="status-info">
                            <span class="status-label">Status</span>
                            <span class="status-value" id="workStatus">Off Duty</span>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="status-info">
                            <span class="status-label">Passengers</span>
                            <span class="status-value" id="passengerCount">0</span>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon">
                            <i class="fas fa-trophy"></i>
                        </div>
                        <div class="status-info">
                            <span class="status-label">Delivered</span>
                            <span class="status-value" id="deliveredCount">0</span>
                        </div>
                    </div>
                </div>

                <div class="menu-options" id="menuOptions">
                    <!-- Menu options will be dynamically generated -->
                </div>
            </div>

            <div class="menu-footer">
                <div class="company-motto">
                    <p>🚌 Serving Los Santos with Pride • Safe • Reliable • Professional</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Route Info Modal -->
    <div id="routeInfoModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-route"></i> Route Information</h3>
                <span class="modal-close" onclick="closeRouteInfo()">&times;</span>
            </div>
            <div class="modal-body" id="routeInfoContent">
                <!-- Route info will be populated here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
